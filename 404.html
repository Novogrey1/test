<head>

<title>404 — TRP RP</title>

    <style>
:root {
  --sky-top:#b8d4f0; --sky-bot:#daeaf8;
  --bld:#cad4e0; --bld2:#b8c4d4; --win:#a0b8d0;
  --wire:#556677; --pole:#7a8a9a;
  --road:#c8d0da; --mark:#aab4be;
  --tx:#1a2533; --tx2:#4a6080;
  --ac:#2a7cde; --ac2:#1a5cb0;
  --card:rgba(255,255,255,.82); --sh:rgba(30,60,120,.12);
}
body.dark {
  --sky-top:#0a1628; --sky-bot:#142038;
  --bld:#1a2a3a; --bld2:#142030; --win:#1e3a58;
  --wire:#3a5a78; --pole:#304050;
  --road:#1e2a38; --mark:#2a3a4e;
  --tx:#d8e8f8; --tx2:#7898b8;
  --ac:#3a8cf0; --ac2:#2a6ccc;
  --card:rgba(14,30,48,.88); --sh:rgba(0,10,30,.45);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Nunito',sans-serif}

/* Full viewport split: sky fills remaining, road fixed 90px at bottom */
.sky {
  position:fixed; inset:0 0 90px 0;
  background:linear-gradient(180deg,var(--sky-top),var(--sky-bot));
  overflow:hidden; transition:background .4s;
}
.road {
  position:fixed; bottom:0; left:0; right:0; height:90px;
  background:var(--road); transition:background .4s;
}
.road::after {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background:var(--mark); transition:background .4s;
}
.road::before {
  content:''; position:absolute; top:42px; left:0; right:0; height:6px;
  background:repeating-linear-gradient(90deg,var(--mark) 0 60px,transparent 60px 120px);
  animation:road-scroll 1.2s linear infinite; transition:background .4s;
}
@keyframes road-scroll{from{background-position:0 0}to{background-position:-120px 0}}

/* Trolleybus: fixed, sits on road surface */
.troll {
  position:fixed;
  bottom:77px;   /* road top (90px) minus 3px wheel gap in image */
  left:-440px;
  width:420px;
  z-index:100;
  animation:drive 7s linear infinite;
}
.troll img {
  display:block; width:100%;
  animation:bounce .3s ease-in-out infinite alternate;
}
@keyframes drive{from{left:-440px}to{left:calc(100vw + 60px)}}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-2.5px)}}

/* sparks */
.sparks{position:absolute;top:5px;left:27%;z-index:101}
.sp{position:absolute;width:5px;height:5px;border-radius:50%;
  background:#60b8ff;box-shadow:0 0 4px 2px #60b8ff66;
  animation:sp .5s ease-out infinite}
.sp:nth-child(2){animation-delay:.18s;background:#fff;width:3px;height:3px;left:4px}
.sp:nth-child(3){animation-delay:.35s;background:#aad4ff;left:-4px}
@keyframes sp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-14px) scale(.2)}}


/* ── CONTACT SYSTEM ── */
.pole {
  position: fixed;
  bottom: 90px; /* sits on road top */
  width: 5px;
  height: 140px;
  background: var(--pole);
  z-index: 3;
  transition: background 0.4s;
}
.pole::after {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 34px;
  height: 3px;
  background: var(--pole);
  transition: background 0.4s;
}
.wire-svg {
  position: fixed;
  left: 0; right: 0;
  bottom: calc(90px + 118px); /* road + pole height - a bit for wire position */
  width: 100%;
  height: 30px;
  z-index: 3;
  pointer-events: none;
  overflow: visible;
}
/* Stars */
.stars{position:absolute;inset:0;opacity:0;transition:opacity .6s;pointer-events:none}
body.dark .stars{opacity:1}
.star{position:absolute;background:#fff;border-radius:50%;
  animation:twinkle var(--d,2s) var(--dl,0s) infinite ease-in-out}
@keyframes twinkle{0%,100%{opacity:.15}50%{opacity:1}}

/* Sun/Moon */
.sun{position:absolute;top:14%;right:12%;width:54px;height:54px;border-radius:50%;
  background:radial-gradient(circle at 40% 40%,#ffe87a,#f4a820);
  box-shadow:0 0 30px 10px #ffd04066;transition:all .6s}
body.dark .sun{background:radial-gradient(circle at 60% 35%,#f0f0f0,#c8d8e8);
  box-shadow:0 0 20px 6px #80a0c040}

/* Clouds */
.cloud{position:absolute;opacity:.85;transition:opacity .4s}
body.dark .cloud{opacity:.12}
.cloud path{fill:white}
@keyframes cdrift{from{transform:translateX(0)}to{transform:translateX(50px)}}

/* Buildings */
.buildings{position:absolute;bottom:0;left:0;right:0}

/* Wires */




/* 404 ghost */
.ghost{position:absolute;top:50%;left:50%;transform:translate(-50%,-62%);
  font-family:'Bebas Neue',sans-serif;font-size:clamp(120px,22vw,260px);
  color:var(--tx);opacity:.06;letter-spacing:.04em;
  pointer-events:none;user-select:none;white-space:nowrap;transition:color .4s}

/* Card */
.card{position:absolute;top:50%;left:50%;transform:translate(-50%,-58%);
  z-index:50;text-align:center;
  background:var(--card);backdrop-filter:blur(12px);
  border-radius:20px;padding:2rem 2.8rem 1.8rem;
  box-shadow:0 8px 40px var(--sh);
  border:1px solid rgba(255,255,255,.25);
  animation:card-in .8s cubic-bezier(.22,1,.36,1) both;min-width:280px}
@keyframes card-in{
  from{opacity:0;transform:translate(-50%,-48%) scale(.9)}
  to{opacity:1;transform:translate(-50%,-58%) scale(1)}
}
.card .lbl{font-size:.75rem;font-weight:700;letter-spacing:.18em;
  color:var(--ac);text-transform:uppercase;margin-bottom:.3rem}
.card h1{font-family:'Bebas Neue',sans-serif;font-size:5rem;
  color:var(--ac);line-height:1;margin-bottom:.2rem}
.card p{font-size:1rem;color:var(--tx2);margin-bottom:1.4rem;
  max-width:240px;line-height:1.5}
.card a{display:inline-block;background:var(--ac);color:#fff;
  padding:.55rem 1.6rem;border-radius:50px;font-weight:700;
  text-decoration:none;font-size:.9rem;transition:all .3s;
  box-shadow:0 4px 14px rgba(42,124,222,.3)}
.card a:hover{background:var(--ac2);transform:translateY(-2px)}

/* UI buttons */
.btn{position:fixed;top:1.2rem;z-index:200;
  background:var(--card);backdrop-filter:blur(8px);
  border:1.5px solid var(--ac);border-radius:50px;
  padding:.4rem 1.1rem;font-size:.9rem;
  font-family:'Nunito',sans-serif;font-weight:700;cursor:pointer;
  transition:all .3s;box-shadow:0 2px 12px var(--sh);text-decoration:none}
.btn:hover{background:var(--ac);color:#fff;transform:scale(1.06)}
#back{left:1.4rem;color:var(--ac)}
#theme{right:1.4rem;color:var(--tx)}

@media(max-width:600px){
  .troll{width:280px}
  @keyframes drive{from{left:-300px}to{left:calc(100vw + 40px)}}
}
/* ── TABLET (768px) ── */
@media(max-width:768px){
  .card{padding:1.6rem 2rem 1.4rem; min-width:240px;}
  .card h1{font-size:4rem;}
  .card p{font-size:.95rem;}
  .ghost{font-size:30vw;}
  .pole{height:110px;}
  .wire-svg{bottom:calc(90px + 92px);}
  .troll{width:340px;}
  @keyframes drive{from{left:-360px}to{left:calc(100vw + 50px)}}
}

/* ── PHONE (480px) ── */
@media(max-width:480px){
  .card{padding:1.2rem 1.4rem; min-width:200px; border-radius:14px;}
  .card h1{font-size:3rem;}
  .card p{font-size:.85rem; margin-bottom:1rem;}
  .card a{padding:.45rem 1.2rem; font-size:.82rem;}
  .ghost{font-size:38vw;}
  .btn{padding:.35rem .8rem; font-size:.8rem;}
  .pole{height:90px; width:4px;}
  .pole::after{width:26px;}
  .wire-svg{bottom:calc(90px + 75px);}
  .troll{width:240px; bottom:72px;}
  @keyframes drive{from{left:-260px}to{left:calc(100vw + 30px)}}
  .sun{width:38px;height:38px;}
  .road{height:70px;}
  .pole{bottom:70px;}
  .wire-svg{bottom:calc(70px + 75px);}
}

/* ── SMALL PHONE (360px) ── */
@media(max-width:360px){
  .card h1{font-size:2.5rem;}
  .troll{width:200px;}
  @keyframes drive{from{left:-220px}to{left:calc(100vw + 20px)}}
}

    </style>

    <script>
// ── TRANSLATIONS ──
const t = {
  ru: {
    label:   'TRP RP — Ошибка',
    title:   '404',
    desc:    'Страница не найдена.<br>Кажется, троллейбус уехал не туда.',
    btn:     '← На главную',
    back:    '← На главную',
    lang:    'EN'
  },
  en: {
    label:   'TRP RP — Error',
    title:   '404',
    desc:    'Page not found.<br>Looks like the trolleybus took the wrong route.',
    btn:     '← Go Home',
    back:    '← Go Home',
    lang:    'RU'
  }
};

function applyLang(lang) {
  localStorage.setItem('lang', lang);
  const l = t[lang];
  document.querySelector('.lbl').textContent    = l.label;
  document.querySelector('.card p').innerHTML   = l.desc;
  document.querySelector('.card a').textContent = l.btn;
  document.getElementById('back').textContent   = l.back;
  document.getElementById('lang').textContent   = l.lang;
}

// ── THEME ──
const themeBtn = document.getElementById('theme');
const dark0 = localStorage.getItem('theme') === 'dark';
if (dark0) { document.body.classList.add('dark'); themeBtn.textContent = '☀️'; }
themeBtn.addEventListener('click', () => {
  const d = document.body.classList.toggle('dark');
  themeBtn.textContent = d ? '☀️' : '🌙';
  localStorage.setItem('theme', d ? 'dark' : 'light');
});

// ── LANGUAGE ──
const langBtn = document.getElementById('lang');
let currentLang = localStorage.getItem('lang') || 'ru';
applyLang(currentLang);
langBtn.addEventListener('click', () => {
  currentLang = currentLang === 'ru' ? 'en' : 'ru';
  applyLang(currentLang);
});

// ── STARS ──
const st = document.getElementById('stars');
for (let i = 0; i < 120; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const sz = (Math.random() * 2.5 + 0.5).toFixed(1);
  s.style.cssText = `width:${sz}px;height:${sz}px;top:${(Math.random()*100).toFixed(1)}%;left:${(Math.random()*100).toFixed(1)}%;--d:${(Math.random()*3+1.5).toFixed(1)}s;--dl:${(Math.random()*4).toFixed(1)}s`;
  st.appendChild(s);
}

// ── CLICK TROLLEYBUS TO SPEED UP ──
document.getElementById('troll').addEventListener('click', () => {
  const tb = document.getElementById('troll');
  tb.style.animationDuration = '3s';
  setTimeout(() => tb.style.animationDuration = '7s', 3000);
});

    </script>
